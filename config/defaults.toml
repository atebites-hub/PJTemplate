# config/defaults.toml

[app]
name = "yourapp"
env = "development"
debug = false

[server]
host = "127.0.0.1"
port = 8080

[workers]
max_processes = 8
spawn_mode = "subprocess"
request_timeout_ms = 2000
startup_mode = "lazy"

[logging]
root = "logs"
current_dir = "logs/current"
archive_dir = "logs/archive"
level = "INFO"
format = "jsonl"
max_mb = 128
backup_count = 50
flush_interval_ms = 250
queue_enabled = true

[observability]
service_name = "yourapp"
metrics_enabled = true
tracing_enabled = true
log_correlation_enabled = true
otlp_endpoint = "http://alloy:4317"
sample_ratio = 0.1

[metrics]
path = "/metrics"
namespace = "yourapp"
subsystem = "api"
process_metrics_enabled = true

[tracing]
exporter = "otlp"
protocol = "grpc"
insecure = true
timeout_ms = 5000

[fastapi]
title = "yourapp"
docs_url = "/docs"
redoc_url = "/redoc"
openapi_url = "/openapi.json"

[security]
cors_enabled = false
trusted_hosts = ["127.0.0.1", "localhost"]

[features]
web_ui_writes_config = true
enable_worker_pipeline = true
enable_background_tasks = false