apiVersion: 1

providers:
  - name: "yourapp-dashboards"
    orgId: 1
    folder: "Observability"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false