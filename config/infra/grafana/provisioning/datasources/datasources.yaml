apiVersion: 1
prune: true

datasources:
  - name: Prometheus
    type: prometheus
    uid: prom
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 10s

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id":"([a-fA-F0-9]+)"'
          datasourceUid: tempo
          url: '$${__value.raw}'

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: "loki"
        spanStartTimeShift: "-10m"
        spanEndTimeShift: "10m"
        tags: ["service.name", "service", "level"]
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: "prom"
        spanStartTimeShift: "-10m"
        spanEndTimeShift: "10m"
        tags:
          - key: "service.name"
            value: "service"
          - key: "span.name"
            value: "span"