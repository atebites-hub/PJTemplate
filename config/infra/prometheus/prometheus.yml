global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8080"]

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]