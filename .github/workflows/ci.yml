name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev dependencies from hashed lockfile
        run: python -m pip install --require-hashes -r requirements-dev.txt

      - name: Install project
        run: python -m pip install -e . --no-deps

      - name: Pip sanity
        run: python -m pip check

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: BasedPyright
        run: basedpyright

      - name: Bandit
        run: bandit -c config/security/bandit.yaml -r src

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: Interrogate
        run: interrogate -c pyproject.toml

      - name: MkDocs strict build
        run: mkdocs build -f config/docs/mkdocs.yml --strict

      - name: Pytest
        run: pytest -q

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/